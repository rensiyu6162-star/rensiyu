<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>百战营销平台 - 计费对账预览</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:"PingFang SC","Microsoft YaHei",sans-serif;font-size:14px;background:#f5f6fa;color:#333;}

/* 顶部 */
.header{height:50px;background:#fff;border-bottom:1px solid #e8e8e8;display:flex;align-items:center;justify-content:space-between;padding:0 20px;position:fixed;top:0;left:0;right:0;z-index:100;}
.header-logo{font-size:16px;font-weight:600;color:#1a1a1a;}
.avatar{width:32px;height:32px;border-radius:50%;background:#1677ff;color:#fff;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:600;}

/* 左侧菜单 */
.sidebar{width:200px;background:#fff;border-right:1px solid #e8e8e8;position:fixed;top:50px;left:0;bottom:0;overflow-y:auto;z-index:50;}
.menu-group{padding:8px 0;}
.menu-parent{display:flex;align-items:center;justify-content:space-between;padding:10px 16px;cursor:pointer;color:#1677ff;font-size:14px;font-weight:500;}
.menu-parent .icon-left{display:flex;align-items:center;gap:8px;}
.menu-child{display:flex;align-items:center;padding:9px 16px 9px 40px;cursor:pointer;color:#555;font-size:13px;text-decoration:none;border-left:3px solid transparent;transition:all .15s;user-select:none;}
.menu-child:hover{color:#1677ff;background:#f0f5ff;}
.menu-child.active{color:#1677ff;background:#f0f5ff;border-left:3px solid #1677ff;font-weight:500;}

/* 内容区 */
.content{margin-left:200px;margin-top:50px;height:calc(100vh - 50px);}
.iframe-pane{width:100%;height:100%;border:none;display:none;}
.iframe-pane.active{display:block;}

/* 切换标签 badge */
.badge{display:inline-block;font-size:10px;background:#1677ff;color:#fff;border-radius:8px;padding:1px 5px;margin-left:6px;font-weight:400;}
</style>
</head>
<body>

<div class="header">
  <div class="header-logo">百战营销平台</div>
  <div class="avatar">R</div>
</div>

<div class="sidebar">
  <div class="menu-group">
    <div class="menu-parent">
      <div class="icon-left">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="3" width="20" height="14" rx="2"/><path d="M8 21h8M12 17v4"/></svg>
        计费对账
      </div>
      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="#1677ff" stroke-width="2.5"><polyline points="18 15 12 9 6 15"/></svg>
    </div>
    <div class="menu-child">供应商管理</div>
    <div class="menu-child">出账管理</div>
    <div class="menu-child">出账明细</div>
    <div class="menu-child">客户账单</div>
    <div class="menu-child active" onclick="switchPage('supplier', this)">供应商账单</div>
    <div class="menu-child" onclick="switchPage('discount', this)">数据费减免</div>
    <div class="menu-child" onclick="switchPage('po', this)">PO单商品拆解</div>
  </div>
</div>

<div class="content">
  <iframe id="pane-supplier" class="iframe-pane active" src="supplier_bill.html"></iframe>
  <iframe id="pane-discount" class="iframe-pane" src=""></iframe>
  <iframe id="pane-po"       class="iframe-pane" src=""></iframe>
</div>

<script>
const pages = {
  supplier: 'supplier_bill.html',
  discount: 'data_fee_discount.html',
  po:       'po_split.html',
};

function switchPage(key, el) {
  // 切换菜单高亮
  document.querySelectorAll('.menu-child').forEach(e => e.classList.remove('active'));
  el.classList.add('active');

  // 懒加载 iframe src
  const iframe = document.getElementById('pane-' + key);
  if (!iframe.src || !iframe.src.endsWith(pages[key])) {
    iframe.src = pages[key];
  }

  // 显示对应面板
  document.querySelectorAll('.iframe-pane').forEach(f => f.classList.remove('active'));
  iframe.classList.add('active');
}
</script>
</body>
</html>
